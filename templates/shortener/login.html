{% extends 'base.html' %}

{% block content %}
<div class="glass-card" style="max-width: 400px; margin: 0 auto;">
    <h2 style="text-align: center; margin-top: 0; margin-bottom: 2rem;">Iniciar Sesión</h2>
    
    {% if form.errors %}
    <div style="background: rgba(239, 68, 68, 0.1); border: 1px solid rgba(239, 68, 68, 0.3); color: #fca5a5; padding: 1rem; border-radius: 8px; margin-bottom: 1.5rem;">
        Usuario o contraseña incorrectos. Por favor, inténtalo de nuevo.
    </div>
    {% endif %}

    <form method="post" action="{% url 'login' %}">
        {% csrf_token %}
        
        <div class="form-group">
            <label for="id_username">Usuario</label>
            <input type="text" name="username" autofocus autocapitalize="none" autocomplete="username" maxlength="150" required id="id_username" placeholder="ingenieriaweb">
        </div>
        
        <div class="form-group" style="margin-bottom: 2rem;">
            <label for="id_password">Contraseña</label>
            <input type="password" name="password" autocomplete="current-password" required id="id_password" placeholder="••••••••">
        </div>
        
        <button type="submit" class="btn btn-full">Entrar</button>
        <input type="hidden" name="next" value="{{ next }}">
    </form>
</div>
{% endblock %}
